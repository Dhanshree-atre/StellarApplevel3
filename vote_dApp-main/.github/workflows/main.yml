name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # FRONTEND (React)
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      working-directory: frontend/stellar-poll-app
      run: npm install

    - name: Build React App
      working-directory: frontend/stellar-poll-app
      run: npm run build

    # CONTRACT (Rust - Soroban)
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable

    - name: Run Contract Tests
      working-directory: contract/poll-contract
      run: cargo test