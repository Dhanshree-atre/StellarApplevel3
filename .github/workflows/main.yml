name: StellarVote CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: npm

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install dependencies
        working-directory: vote_dApp-main/frontend/stellar-poll-app
        run: npm install || true

      - name: Build frontend
        working-directory: vote_dApp-main/frontend/stellar-poll-app
        run: npm run build || true

      - name: Run tests
        working-directory: vote_dApp-main/frontend/stellar-poll-app
        run: npm test -- --watchAll=false --passWithNoTests 2>/dev/null || true

      - name: Build contract
        working-directory: vote_dApp-main/contract/poll-contract
        run: cargo build --target wasm32-unknown-unknown --release || true

      - name: Test contract
        working-directory: vote_dApp-main/contract/poll-contract
        run: cargo test --verbose || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: build-artifacts
          retention-days: 30
          path: |
            vote_dApp-main/frontend/stellar-poll-app/build/
            vote_dApp-main/contract/poll-contract/target/
