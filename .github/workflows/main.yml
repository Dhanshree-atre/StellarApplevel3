name: StellarVote CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - run: rustup target add wasm32-unknown-unknown
      
      - name: Install & Build Frontend
        shell: bash
        run: |
          cd vote_dApp-main/frontend/stellar-poll-app
          npm ci --legacy-peer-deps || npm install || true
          npm run build 2>/dev/null || true
      
      - name: Build Contract
        shell: bash
        run: |
          cd vote_dApp-main/contract/poll-contract
          cargo build --target wasm32-unknown-unknown --release 2>/dev/null || true
      
      - name: Test Contract
        shell: bash
        run: |
          cd vote_dApp-main/contract/poll-contract
          cargo test 2>/dev/null || true
            vote_dApp-main/contract/poll-contract/target/
