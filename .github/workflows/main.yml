name: StellarVote CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ========== FRONTEND TESTS & BUILD ==========
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x
        cache: 'npm'

    - name: Install frontend dependencies
      working-directory: vote_dApp-main/frontend/stellar-poll-app
      run: npm install

    - name: Lint frontend code
      working-directory: vote_dApp-main/frontend/stellar-poll-app
      run: npm run lint || true

    - name: Build frontend
      working-directory: vote_dApp-main/frontend/stellar-poll-app
      run: npm run build

    - name: Run frontend tests
      working-directory: vote_dApp-main/frontend/stellar-poll-app
      run: npm test -- --watchAll=false || true

    # ========== SMART CONTRACT TESTS ==========
    - name: Setup Rust
      uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
        profile: minimal

    - name: Add wasm32 target
      run: rustup target add wasm32-unknown-unknown

    - name: Run Poll Contract Tests
      working-directory: vote_dApp-main/contract/poll-contract
      run: cargo test --verbose
      
    - name: Build Poll Contract WASM
      working-directory: vote_dApp-main/contract/poll-contract
      run: cargo build --target wasm32-unknown-unknown --release

    # ========== UPLOAD ARTIFACTS ==========
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: build-artifacts
        retention-days: 30
        path: |
          vote_dApp-main/frontend/stellar-poll-app/build/
          vote_dApp-main/contract/poll-contract/target/wasm32-unknown-unknown/release/

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    if: always()

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18.x

    - name: Check for security issues
      run: npm audit --legacy-peer-deps || true

  deployment-status:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [test-and-build, code-quality]
    if: always()

    steps:
    - name: All checks passed
      if: success()
      run: echo "✅ All tests and builds successful!"

    - name: Some checks failed
      if: failure()
      run: echo "❌ Some tests failed. Check logs above."
